name: Learning how to build
run-name: ${{ github.actor }} is publishing on github pages
on:
  push:
    branches:
      - zeroPoint/react
    pull_request:
    branches: [ main ]
permissions:
  contents: write

workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
      - run: |
          npm ci
          npm run build --if-present
